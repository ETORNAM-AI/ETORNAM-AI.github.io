<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Gallery</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: grey;
      }
      .container {
        width: 80%;
        margin: 0 auto;
        padding: 20px;
        background-color: #fff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
      }
      h1 {
        text-align: center;
        color: #0056b3;
      }
      .carousel {
        position: relative;
        width: 100%;
        max-width: 700px;
        margin: 30px auto;
        overflow: hidden;
      }
      .carousel-images {
        display: flex;
        transition: transform 0.5s ease-in-out;
      }
      .carousel-images img {
        width: 100%;
        border-radius: 8px;
      }
      .carousel-buttons {
        position: absolute;
        top: 50%;
        width: 100%;
        display: flex;
        justify-content: space-between;
      }
      .carousel-buttons button {
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 50%;
      }
      .carousel-buttons button:hover {
        background-color: rgba(0, 0, 0, 0.7);
      }
      .video-section {
        margin-top: 50px;
        text-align: center;
      }
      .video-section iframe,
      .video-section video {
        max-width: 100%;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .container {
          width: 90%;
          padding: 15px;
        }
        .carousel {
          max-width: 100%;
        }
        .carousel-buttons button {
          padding: 8px;
        }
      }

      @media (max-width: 480px) {
        .carousel-buttons button {
          padding: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>My Gallery</h1>

      <!-- Carousel Section -->
      <div class="carousel">
        <div class="carousel-images">
          <img src="images/calculato app.png" alt="Project 1" />
          <img src="images/mario .png" alt="Project 2" />
          <img src="images/royal cliff.png" alt="Project 3" />
        </div>
        <div class="carousel-buttons">
          <button onclick="prevSlide()">&#10094;</button>
          <button onclick="nextSlide()">&#10095;</button>
        </div>
      </div>

      <!-- Video Section -->
      <div class="video-section">
        <h2>Project Demo Videos</h2>
        <video width="600" controls="controls" preload="preload" src="images/vid.mp4"></video>
      </div>
    </div>

    <script>
      let currentIndex = 0;

      const images = document.querySelectorAll(".carousel-images img");
      const totalImages = images.length;

      function showSlide(index) {
        if (index >= totalImages) {
          currentIndex = 0;
        } else if (index < 0) {
          currentIndex = totalImages - 1;
        }
        const newTransform = -100 * currentIndex + "%";
        document.querySelector(
          ".carousel-images"
        ).style.transform = `translateX(${newTransform})`;
      }

      function nextSlide() {
        currentIndex++;
        showSlide(currentIndex);
      }

      function prevSlide() {
        currentIndex--;
        showSlide(currentIndex);
      }

      // Initial slide display
      showSlide(currentIndex);
    </script>
  </body>
</html>
